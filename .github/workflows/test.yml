name: Test
on:
  push:
  workflow_dispatch:

jobs:
  setup-python:
    name: Set up Python
    uses: t-doc-org/common/.github/workflows/setup-python.yml@main
    with:
      build: true
  test-sites:
    name: Test sites
    needs: [setup-python]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Run site tests
        run: |
          ${{ needs.setup-python.outputs.python-path }} tools/test-sites.py \
              test

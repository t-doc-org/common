name: Test
on:
  push:
  workflow_dispatch:

jobs:
  test-sites:
    name: Test sites
    runs-on: ubuntu-latest
    steps:
      - name: Set up for running t-doc
        id: setup
        uses: t-doc-org/common/.github/actions/setup@main
        with:
          build-pkgs: true
          ssh-key: ${{ secrets.DEPLOY_COMMON }}
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: repo
      - name: Run site tests
        run: |
          ${{ steps.setup.outputs.python-path }} repo/tools/test-sites.py \
              t-doc-org.github.io \
              canb \
              common \
              enci \
              informatique \
              janm \
              maths \
              test

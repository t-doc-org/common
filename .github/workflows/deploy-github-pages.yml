name: Publish to GitHub Pages
on:
  workflow_call:
    inputs:
      dev:
        description: "When true, use t-doc/common at head for building."
        type: boolean
        required: false

jobs:
  publish:
    name: Publish to GitHub pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Set up for running t-doc
        id: setup
        uses: t-doc-org/common/.github/actions/setup@main
        with:
          ssh-key: ${{ secrets.DEPLOY_COMMON }}
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: repo
      - name: Build HTML (dev)
        if: ${{ inputs.dev }}
        run: |
          ${{ steps.setup.outputs.python-path }} -P common/run.py \
              tdoc build --source=repo/docs --build=_build html
      - name: Build HTML (release)
        if: ${{ !inputs.dev }}
        run: |
          ${{ steps.setup.outputs.python-path }} -P repo/run.py \
              tdoc build --source=repo/docs --build=_build html
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _build/html
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
